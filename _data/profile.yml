short_bio: >-
  <p>
    I am a Pre-Tenure Associate Professor in College of Computer Science, Northwest University, Shannxi, China. I joined the Visual Intelligence Laboratory in March 2026, led by Prof. Guohua Geng. 
    My current research interests include visual intelligence, multimodal learning, and the digitization of cultural heritage.
  </p>
  <p>
    I graduated from Tianjin University with a PhD degree, under the supervision of <a href="https://cic.tju.edu.cn/faculty/fengwei/index.html" target="_blank">Prof. Wei Feng</a>.
  </p>
  <p>
    长期招收硕士研究生和本科生，欢迎对视觉智能和多模态学习感兴趣的同学与我联系！（fengtl@nwu.edu.cn）
  </p>

